<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>STRswap</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      text-align: center;
    }

    header {
      background: #161b22;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      border-bottom: 1px solid #30363d;
    }

    header img {
      height: 55px;
    }

    h1 {
      margin-top: 40px;
      font-size: 42px;
      color: #00e676;
    }

    p {
      font-size: 18px;
      color: #c9d1d9;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      background: #00e676;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00c96b;
    }

    .token-box {
      margin-top: 40px;
      background: #161b22;
      padding: 25px;
      width: 80%;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 12px;
      border: 1px solid #30363d;
      text-align: left;
    }

    .token-box h3 {
      color: #00e676;
      margin-bottom: 15px;
    }

    .token-box p {
      margin: 8px 0;
      font-size: 16px;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 14px;
      color: #8b949e;
    }
  </style>
</head>
<body>

  <header>
    <img src="Strswap 1-logo_3(2) .svg" alt="STRswap Logo">
